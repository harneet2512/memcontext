name: AMB LongMemEval Smoke

on:
  workflow_dispatch:
    inputs:
      query_limit:
        description: "Queries per LongMemEval category"
        default: "5"
        type: string

permissions:
  contents: read

concurrency:
  group: amb-longmemeval-smoke-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHONIOENCODING: utf-8
  LONGMEMEVAL_DATA_PATH: ${{ github.workspace }}/amb-data/longmemeval_s_cleaned.json
  OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
  TOKENROUTER_BASE_URL: https://api.tokenrouter.com/v1
  OMB_ANSWER_LLM: openrouter-reader
  OMB_ANSWER_MODEL: openai/gpt-oss-120b:free
  OMB_ANSWER_REASONING_EFFORT: high
  OMB_ANSWER_REASONING_EXCLUDE: "1"
  MEMCONTEXT_EXTRACTOR_BACKEND: openrouter
  MEMCONTEXT_EXTRACTOR_ENDPOINT: https://api.tokenrouter.com/v1/chat/completions
  MEMCONTEXT_EXTRACTOR_MODEL: google/gemini-3-flash-preview
  MEMCONTEXT_EXTRACTOR_REASONING_EXCLUDE: "1"
  MEMCONTEXT_EXTRACTOR_MAX_TOKENS: "2048"
  MEMCONTEXT_EXTRACTOR_POOL: "128"
  OMB_JUDGE_LLM: tokenrouter-judge
  OMB_JUDGE_MODEL: google/gemini-3-flash-preview
  OMB_JUDGE_REASONING_EXCLUDE: "1"
  MEMCONTEXT_EMBED_MODEL: BAAI/bge-m3
  MEMCONTEXT_EMBED_EPISODES: "1"
  HF_HOME: ~/.cache/huggingface
  SENTENCE_TRANSFORMERS_HOME: ~/.cache/huggingface/sentence-transformers

jobs:
  dataset:
    name: Prepare LongMemEval data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download LongMemEval-S once
        shell: bash
        run: |
          mkdir -p amb-data
          python - <<'PY'
          import time
          import urllib.request
          from pathlib import Path

          url = (
              "https://huggingface.co/datasets/xiaowu0162/longmemeval-cleaned"
              "/resolve/main/longmemeval_s_cleaned.json"
          )
          path = Path("amb-data/longmemeval_s_cleaned.json")
          for attempt in range(1, 8):
              try:
                  urllib.request.urlretrieve(url, path)
                  break
              except Exception:
                  if attempt == 7:
                      raise
                  time.sleep(20 * attempt)
          if path.stat().st_size < 1_000_000:
              raise SystemExit("LongMemEval download is unexpectedly small.")
          PY

      - name: Upload LongMemEval data
        uses: actions/upload-artifact@v4
        with:
          name: longmemeval-s-cleaned
          path: amb-data/longmemeval_s_cleaned.json

  category:
    name: ${{ matrix.category }}
    needs: dataset
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment: benchmark
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        category:
          - single-session-user
          - single-session-assistant
          - multi-session
          - temporal-reasoning
          - knowledge-update
          - single-session-preference
    env:
      OPENROUTER_AMB_READER_KEY: ${{ secrets.OPENROUTER_AMB_READER_KEY }}
      TOKENROUTER_AMB_GEMINI_KEY: ${{ secrets.TOKENROUTER_AMB_GEMINI_KEY }}
      TOKENROUTER_AMB_EXTRACTOR_KEY: ${{ secrets.TOKENROUTER_AMB_EXTRACTOR_KEY }}
      TOKENROUTER_AMB_JUDGE_KEY: ${{ secrets.TOKENROUTER_AMB_JUDGE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Download LongMemEval data
        uses: actions/download-artifact@v4
        with:
          name: longmemeval-s-cleaned
          path: amb-data

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-m3-${{ runner.os }}-v2
          restore-keys: |
            hf-bge-m3-${{ runner.os }}-

      - name: Verify secrets are present
        shell: bash
        run: |
          test -n "$OPENROUTER_AMB_READER_KEY"
          test -n "${TOKENROUTER_AMB_GEMINI_KEY:-${TOKENROUTER_AMB_JUDGE_KEY:-}}"

      - name: Probe routed APIs
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          def probe(name, base_url, key, model):
              if not key:
                  raise SystemExit(f"{name} preflight failed: missing API key")
              payload = {
                  "model": model,
                  "messages": [{"role": "user", "content": "Return ok."}],
                  "temperature": 0,
                  "max_tokens": 8,
              }
              req = urllib.request.Request(
                  base_url.rstrip("/") + "/chat/completions",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {key}",
                      "Content-Type": "application/json",
                      "X-Title": "memcontext-amb-preflight",
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      response.read(128)
              except urllib.error.HTTPError as exc:
                  raise SystemExit(f"{name} preflight failed with HTTP {exc.code}") from exc

          probe(
              "OpenRouter reader",
              os.environ["OPENROUTER_BASE_URL"],
              os.environ["OPENROUTER_AMB_READER_KEY"],
              os.environ["OMB_ANSWER_MODEL"],
          )
          probe(
              "TokenRouter extractor",
              os.environ["TOKENROUTER_BASE_URL"],
              (
                  os.environ.get("TOKENROUTER_AMB_GEMINI_KEY")
                  or os.environ.get("TOKENROUTER_AMB_JUDGE_KEY")
                  or os.environ.get("TOKENROUTER_AMB_EXTRACTOR_KEY")
              ),
              os.environ["MEMCONTEXT_EXTRACTOR_MODEL"],
          )
          probe(
              "TokenRouter judge",
              os.environ["TOKENROUTER_BASE_URL"],
              (
                  os.environ.get("TOKENROUTER_AMB_GEMINI_KEY")
                  or os.environ.get("TOKENROUTER_AMB_JUDGE_KEY")
              ),
              os.environ["OMB_JUDGE_MODEL"],
          )
          PY

      - name: Clone AMB harness read-only
        shell: bash
        run: |
          git clone --depth 1 https://github.com/vectorize-io/agent-memory-benchmark.git "$RUNNER_TEMP/agent-memory-benchmark"
          git -C "$RUNNER_TEMP/agent-memory-benchmark" remote -v
          git -C "$RUNNER_TEMP/agent-memory-benchmark" status --short

      - name: Install MemContext and AMB
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade "FlagEmbedding>=1.2.10" "sentence-transformers>=3.0" "transformers>=4.40"
          python -m pip install -e ".[embeddings]"
          python -m pip install -e "$RUNNER_TEMP/agent-memory-benchmark"

      - name: Run AMB category smoke
        shell: bash
        run: |
          python -m evals.amb_memcontext.run \
            --amb-root "$RUNNER_TEMP/agent-memory-benchmark" \
            --dataset longmemeval \
            --split s \
            --memory memcontext-full \
            --category "${{ matrix.category }}" \
            --query-limit "${{ inputs.query_limit }}" \
            --name "memcontext-full-${{ matrix.category }}" \
            --description "MemContext AMB smoke: OpenRouter gpt-oss reader, TokenRouter Gemini extractor, TokenRouter Gemini judge, BGE-M3 embeddings."

      - name: Confirm AMB checkout stayed clean
        if: always()
        shell: bash
        run: |
          if [ -d "$RUNNER_TEMP/agent-memory-benchmark/.git" ]; then
            git -C "$RUNNER_TEMP/agent-memory-benchmark" status --short
          else
            echo "AMB checkout was not cloned; skipping clean-check."
          fi

      - name: Upload AMB outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amb-longmemeval-${{ matrix.category }}
          path: evals/amb_outputs/**
